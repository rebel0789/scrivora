name: Feature request
description: Suggest a focused improvement for Scrivora.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should Scrivora handle better?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest product behavior that would solve it.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dictation trigger
        - Model management
        - Text insertion
        - Privacy/export
        - Website/docs
        - Release/update
        - Other
    validations:
      required: true
