name: Swift

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Resolve packages
        run: swift package resolve

      - name: Run tests
        run: swift test

      - name: Build app target
        run: swift build --product LocalVoiceFlowApp

      - name: Audit sensitive files
        run: bash Scripts/audit_sensitive_files.sh

      - name: Stage website
        run: bash Scripts/stage_site.sh

      - name: Validate website HTML
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          for path in [Path(".site/index.html"), Path(".site/releases/v0.4.1.html")]:
              HTMLParser().feed(path.read_text())
          PY
